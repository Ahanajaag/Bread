<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أوقات الصلاة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080C12;
    --bg2: #0F1620;
    --bg3: #161E2B;
    --gold: #D4A017;
    --gold2: #F0C040;
    --gold-glow: rgba(212,160,23,0.15);
    --white: #F0EEE8;
    --muted: #6B7A8D;
    --green: #2ECC71;
    --border: rgba(212,160,23,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 42%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 35vh;
    background: radial-gradient(ellipse at 50% 100%, rgba(212,160,23,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px 32px 16px;
    gap: 14px;
  }

  /* ========== HEADER ========== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .city-name {
    font-family: 'Cairo', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold2);
    line-height: 1;
    letter-spacing: 0.02em;
  }

  .hijri-date {
    font-size: 1rem;
    color: var(--muted);
    font-weight: 400;
  }

  .header-center {
    text-align: center;
  }

  .app-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .crescent {
    font-size: 2.4rem;
    filter: drop-shadow(0 0 12px var(--gold));
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .header-left {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .current-time {
    font-family: 'Cairo', sans-serif;
    font-size: 3.5rem;
    font-weight: 300;
    color: var(--white);
    line-height: 1;
    letter-spacing: 0.04em;
  }

  .current-date {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .btn-city {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--gold);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.9rem;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-city:hover, .btn-city:focus {
    background: var(--gold-glow);
    border-color: var(--gold);
    outline: none;
  }

  /* ========== DIVIDER ========== */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), var(--gold), var(--border), transparent);
    flex-shrink: 0;
  }

  /* ========== PRAYER CARDS ========== */
  .prayers-grid {
    display: flex;
    gap: 10px;
    flex: 1;
    min-height: 0;
  }

  .prayer-card {
    flex: 1;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 8px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .prayer-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.4s;
    background: radial-gradient(ellipse at 50% 120%, rgba(212,160,23,0.12) 0%, transparent 70%);
  }

  .prayer-card.active {
    border-color: var(--gold);
    background: var(--bg3);
    box-shadow: 0 0 30px rgba(212,160,23,0.15), inset 0 1px 0 rgba(212,160,23,0.2);
  }

  .prayer-card.active::before { opacity: 1; }

  .prayer-card.active .prayer-time {
    color: var(--gold2);
    text-shadow: 0 0 20px rgba(240,192,64,0.4);
  }

  .prayer-card.active .prayer-name {
    color: var(--white);
  }

  .prayer-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .prayer-name {
    font-family: 'Cairo', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--muted);
    transition: color 0.4s;
  }

  .prayer-time {
    font-family: 'Cairo', sans-serif;
    font-size: 1.9rem;
    font-weight: 300;
    color: var(--white);
    letter-spacing: 0.04em;
    transition: color 0.4s;
  }

  .prayer-card.active .active-dot {
    display: block;
  }

  .active-dot {
    display: none;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* ========== COUNTDOWN ========== */
  .countdown-section {
    flex-shrink: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .countdown-label {
    font-size: 1.1rem;
    color: var(--muted);
    font-weight: 400;
    white-space: nowrap;
  }

  .countdown-label span {
    color: var(--white);
    font-weight: 600;
  }

  .countdown-timer {
    font-family: 'Cairo', sans-serif;
    font-size: 3.2rem;
    font-weight: 300;
    color: var(--gold2);
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(240,192,64,0.3);
    min-width: 200px;
    text-align: center;
  }

  .countdown-timer.iqama {
    color: var(--green);
    text-shadow: 0 0 30px rgba(46,204,113,0.3);
  }

  .iqama-label {
    font-size: 1rem;
    color: var(--green);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: left;
    min-width: 180px;
  }

  .iqama-label.visible { opacity: 1; }

  /* ========== CITY MODAL ========== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,12,18,0.92);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 640px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transform: scale(0.95);
    transition: transform 0.3s;
  }

  .modal-overlay.open .modal { transform: scale(1); }

  .modal-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold2);
    text-align: center;
  }

  .search-row {
    display: flex;
    gap: 10px;
  }

  .search-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Tajawal', sans-serif;
    font-size: 1.1rem;
    padding: 10px 16px;
    outline: none;
    transition: border-color 0.2s;
    text-align: right;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--gold); }

  .btn-search {
    background: var(--gold);
    border: none;
    color: var(--bg);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-search:hover { background: var(--gold2); }

  .cities-list {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .cities-list::-webkit-scrollbar { width: 4px; }
  .cities-list::-webkit-scrollbar-track { background: transparent; }
  .cities-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .city-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .city-item:hover, .city-item:focus {
    border-color: var(--gold);
    background: var(--gold-glow);
    outline: none;
  }

  .city-name-ar { font-size: 1.1rem; font-weight: 600; }
  .city-name-en { font-size: 0.9rem; color: var(--muted); }

  .btn-close {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    align-self: center;
    transition: all 0.2s;
  }

  .btn-close:hover { border-color: var(--muted); color: var(--white); }

  /* ========== LOADING ========== */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8,12,18,0.85);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .loading-overlay.show { opacity: 1; pointer-events: all; }

  .loader {
    width: 48px; height: 48px;
    border: 3px solid rgba(212,160,23,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 1.1rem;
    color: var(--muted);
  }

  /* Error state */
  .error-banner {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #2D1515;
    border: 1px solid #8B2020;
    color: #FF6B6B;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 1rem;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .error-banner.show { opacity: 1; }
</style>
</head>
<body>

<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-right">
      <div class="city-name" id="cityName">مكة المكرمة</div>
      <div class="hijri-date" id="hijriDate">جاري التحميل...</div>
    </div>

    <div class="header-center">
      <div class="app-title">أوقات الصلاة</div>

    </div>

    <div class="header-left">
      <div class="current-time" id="currentTime">00:00</div>
      <div class="current-date" id="currentDate"></div>
      <button class="btn-city" onclick="openModal()">🏙 تغيير المدينة</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- PRAYER CARDS -->
  <div class="prayers-grid">
    <div class="prayer-card" id="card-fajr">
      <div class="prayer-icon">🌙</div>
      <div class="prayer-name">الفجر</div>
      <div class="prayer-time" id="time-fajr">--:--</div>
      <div class="active-dot"></div>
    </div>
    <div class="prayer-card" id="card-sunrise">
      <div class="prayer-icon">🌅</div>
      <div class="prayer-name">الشروق</div>
      <div class="prayer-time" id="time-sunrise">--:--</div>
      <div class="active-dot"></div>
    </div>
    <div class="prayer-card" id="card-dhuhr">
      <div class="prayer-icon">☀️</div>
      <div class="prayer-name">الظهر</div>
      <div class="prayer-time" id="time-dhuhr">--:--</div>
      <div class="active-dot"></div>
    </div>
    <div class="prayer-card" id="card-asr">
      <div class="prayer-icon">🌤</div>
      <div class="prayer-name">العصر</div>
      <div class="prayer-time" id="time-asr">--:--</div>
      <div class="active-dot"></div>
    </div>
    <div class="prayer-card" id="card-maghrib">
      <div class="prayer-icon">🌇</div>
      <div class="prayer-name">المغرب</div>
      <div class="prayer-time" id="time-maghrib">--:--</div>
      <div class="active-dot"></div>
    </div>
    <div class="prayer-card" id="card-isha">
      <div class="prayer-icon">🌃</div>
      <div class="prayer-name">العشاء</div>
      <div class="prayer-time" id="time-isha">--:--</div>
      <div class="active-dot"></div>
    </div>
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown-section">
    <div class="countdown-label" id="nextPrayerLabel">جاري التحميل...</div>
    <div class="countdown-timer" id="countdown">--:--:--</div>
    <div class="iqama-label" id="iqamaLabel">الإقامة بعد ١٠ دقائق</div>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text">جاري تحميل أوقات الصلاة...</div>
</div>

<!-- ERROR BANNER -->
<div class="error-banner" id="errorBanner"></div>

<!-- CITY MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">🏙 اختر مدينتك</div>
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="ابحث عن مدينة... مثال: Riyadh"
        oninput="filterCities()" onkeydown="if(event.key==='Enter') filterCities()">
      <button class="btn-search" onclick="filterCities()">بحث</button>
    </div>
    <div class="cities-list" id="citiesList"></div>
    <button class="btn-close" onclick="closeModal()">إغلاق</button>
  </div>
</div>

<script>
// ========== DATA ==========
const CITIES = [

  { ar: 'سيدني',           en: 'Sydney',        country: 'AU', lat: -33.8688, lng: 151.2093 },
];

const IQAMA = { fajr: 15, dhuhr: 10, asr: 10, maghrib: 5, isha: 10 };
const PRAYER_KEYS = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
const PRAYER_NAMES = { fajr: 'الفجر', sunrise: 'الشروق', dhuhr: 'الظهر', asr: 'العصر', maghrib: 'المغرب', isha: 'العشاء' };

// ========== STATE ==========
let currentCity = CITIES[0];
let prayerTimes = null;
let filteredCities = [...CITIES];

// Load saved city
try {
  const saved = JSON.parse(localStorage.getItem('prayer_city') || 'null');
  if (saved) currentCity = saved;
} catch(e) {}

// ========== INIT ==========
renderCitiesList();
updateClock();
setInterval(updateClock, 1000);
fetchPrayerTimes();

// ========== CLOCK ==========
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('currentTime').textContent = `${hh}:${mm}`;

  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  document.getElementById('currentDate').textContent =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

  if (prayerTimes) updateCountdown();
}

// ========== FETCH PRAYER TIMES ==========
async function fetchPrayerTimes() {
  showLoading(true);
  document.getElementById('cityName').textContent = currentCity.ar;

  const now = new Date();
  const dd = String(now.getDate()).padStart(2,'0');
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const yyyy = now.getFullYear();
  const dateStr = `${dd}-${mm}-${yyyy}`;

  const url = `https://api.aladhan.com/v1/timings/${dateStr}?latitude=${currentCity.lat}&longitude=${currentCity.lng}&method=4&school=1`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.code !== 200) throw new Error(data.status);

    const t = data.data.timings;
    const hijri = data.data.date.hijri;

    prayerTimes = {
      fajr:    cleanTime(t.Fajr),
      sunrise: cleanTime(t.Sunrise),
      dhuhr:   cleanTime(t.Dhuhr),
      asr:     cleanTime(t.Asr),
      maghrib: cleanTime(t.Maghrib),
      isha:    cleanTime(t.Isha),
    };

    document.getElementById('time-fajr').textContent    = prayerTimes.fajr;
    document.getElementById('time-sunrise').textContent = prayerTimes.sunrise;
    document.getElementById('time-dhuhr').textContent   = prayerTimes.dhuhr;
    document.getElementById('time-asr').textContent     = prayerTimes.asr;
    document.getElementById('time-maghrib').textContent = prayerTimes.maghrib;
    document.getElementById('time-isha').textContent    = prayerTimes.isha;

    const hijriDay = hijri.day;
    const hijriMonth = hijri.month.ar;
    const hijriYear = hijri.year;
    document.getElementById('hijriDate').textContent = `${hijriDay} ${hijriMonth} ${hijriYear} هـ`;

    updateCountdown();
  } catch(e) {
    showError('تعذّر تحميل أوقات الصلاة. تحقق من الاتصال بالإنترنت.');
  } finally {
    showLoading(false);
  }
}

function cleanTime(t) {
  return t.split(' ')[0];
}

// ========== COUNTDOWN ==========
function updateCountdown() {
  if (!prayerTimes) return;

  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const nowSecs = now.getSeconds();

  const times = [
    { key: 'fajr',    mins: toMins(prayerTimes.fajr) },
    { key: 'dhuhr',   mins: toMins(prayerTimes.dhuhr) },
    { key: 'asr',     mins: toMins(prayerTimes.asr) },
    { key: 'maghrib', mins: toMins(prayerTimes.maghrib) },
    { key: 'isha',    mins: toMins(prayerTimes.isha) },
  ];

  // Find next prayer
  let next = times.find(p => p.mins > nowMins);
  if (!next) next = { key: 'fajr', mins: toMins(prayerTimes.fajr) + 1440 };

  // Highlight active card
  PRAYER_KEYS.forEach(k => {
    document.getElementById(`card-${k}`).classList.remove('active');
  });
  document.getElementById(`card-${next.key}`).classList.add('active');

  // Check iqama window
  const lastPrayer = [...times].reverse().find(p => p.mins <= nowMins);
  const iqamaEl = document.getElementById('iqamaLabel');
  const countdownEl = document.getElementById('countdown');

  if (lastPrayer) {
    const iqamaDur = IQAMA[lastPrayer.key] || 10;
    const minsSince = nowMins - lastPrayer.mins;
    if (minsSince < iqamaDur) {
      const iqamaLeft = iqamaDur - minsSince;
      document.getElementById('nextPrayerLabel').innerHTML =
        `أُذِّن <span>${PRAYER_NAMES[lastPrayer.key]}</span>`;
      countdownEl.textContent = formatSecs(iqamaLeft * 60 - nowSecs);
      countdownEl.classList.add('iqama');
      iqamaEl.textContent = `الإقامة بعد ${iqamaLeft} ${iqamaLeft === 1 ? 'دقيقة' : 'دقائق'}`;
      iqamaEl.classList.add('visible');
      return;
    }
  }

  // Normal countdown
  countdownEl.classList.remove('iqama');
  iqamaEl.classList.remove('visible');

  const remainSecs = (next.mins - nowMins) * 60 - nowSecs;
  document.getElementById('nextPrayerLabel').innerHTML =
    `باقي على أذان <span>${PRAYER_NAMES[next.key]}</span>`;
  countdownEl.textContent = formatSecs(remainSecs);
}

function toMins(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h * 60 + m;
}

function formatSecs(total) {
  if (total < 0) total = 0;
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ========== MODAL ==========
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('searchInput').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function filterCities() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filteredCities = q
    ? CITIES.filter(c => c.ar.includes(q) || c.en.toLowerCase().includes(q) || c.country.toLowerCase().includes(q))
    : [...CITIES];
  renderCitiesList();
}

function renderCitiesList() {
  const list = document.getElementById('citiesList');
  list.innerHTML = filteredCities.map((c, i) => `
    <div class="city-item" tabindex="0"
      onclick="selectCity(${CITIES.indexOf(c)})"
      onkeydown="if(event.key==='Enter') selectCity(${CITIES.indexOf(c)})">
      <span class="city-name-ar">${c.ar}</span>
      <span class="city-name-en">${c.en}, ${c.country}</span>
    </div>
  `).join('');
}

function selectCity(idx) {
  currentCity = CITIES[idx];
  try { localStorage.setItem('prayer_city', JSON.stringify(currentCity)); } catch(e) {}
  closeModal();
  prayerTimes = null;
  document.getElementById('hijriDate').textContent = 'جاري التحميل...';
  PRAYER_KEYS.forEach(k => {
    document.getElementById(`time-${k}`).textContent = '--:--';
    document.getElementById(`card-${k}`).classList.remove('active');
  });
  document.getElementById('countdown').textContent = '--:--:--';
  document.getElementById('nextPrayerLabel').textContent = 'جاري التحميل...';
  fetchPrayerTimes();
}

// ========== HELPERS ==========
function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('show', v);
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

// Keyboard nav: Escape closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
